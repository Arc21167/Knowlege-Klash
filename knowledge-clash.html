<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRO League 2026 - Knowledge Clash</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030613;
            background-image: radial-gradient(circle at top, #0a173b 0%, #030613 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar: Event Branding & Timer */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 80px;
            background: rgba(10, 23, 59, 0.8);
            border-bottom: 2px solid #00d2ff;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .branding h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00d2ff;
        }

        .branding h2 {
            margin: 5px 0 0 0;
            font-size: 1.5rem;
            color: #ff6b00;
            letter-spacing: 2px;
        }

        .timer-box {
            font-size: 5rem;
            font-weight: 900;
            color: #00ff66;
            text-shadow: 0 0 20px rgba(0, 255, 102, 0.5);
            font-variant-numeric: tabular-nums;
        }

        .timer-box.warning {
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            animation: pulse 1s infinite;
        }

        /* Main Content: Question & Options */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 100px;
        }

        .question-container {
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 80px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            line-height: 1.3;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid #334466;
            border-radius: 15px;
            padding: 30px 40px;
            font-size: 2.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .option-letter {
            background: #ff6b00;
            color: #fff;
            padding: 10px 25px;
            border-radius: 10px;
            margin-right: 30px;
            font-weight: 900;
        }

        /* Reveal Answer Styles */
        .option.correct {
            background: rgba(0, 255, 102, 0.2);
            border-color: #00ff66;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.4);
            transform: scale(1.02);
        }

        .option.dim {
            opacity: 0.3;
            filter: grayscale(100%);
        }

        /* Operator Instructions (Hidden on big screen) */
        .controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.3);
            text-align: right;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="branding">
            <h1>KNOWLEDGE CLASH</h1>
            <h2 id="round-indicator">ROUND 1: GENERAL STEM</h2>
        </div>
        <div class="timer-box" id="timer">30</div>
    </div>

    <div class="content">
        <div class="question-container" id="question-text">
            Loading Question...
        </div>
        
        <div class="options-grid">
            <div class="option" id="opt-A">
                <div class="option-letter">A</div>
                <span id="text-A">Option A</span>
            </div>
            <div class="option" id="opt-B">
                <div class="option-letter">B</div>
                <span id="text-B">Option B</span>
            </div>
            <div class="option" id="opt-C">
                <div class="option-letter">C</div>
                <span id="text-C">Option C</span>
            </div>
            <div class="option" id="opt-D">
                <div class="option-letter">D</div>
                <span id="text-D">Option D</span>
            </div>
        </div>
    </div>

    <div class="controls-hint">
        <b>[Space]</b> Start/Reset Timer | <b>[Enter]</b> Reveal Answer | <b>[Left/Right Arrows]</b> Change Question
    </div>

    <script>
        // ----------------------------------------------------
        // 🛠️ ADD YOUR QUESTIONS HERE
        // ----------------------------------------------------
        const quizData = [
            {
                round: "ROUND 1: ROBOTICS BASICS",
                question: "What does 'WRO' stand for in the global robotics community?",
                options: {
                    A: "World Robot Organization",
                    B: "World Robot Olympiad",
                    C: "Wide Range Operations",
                    D: "Wireless Robotics Operation"
                },
                correctAnswer: "B"
            },
            {
                round: "ROUND 1: PROGRAMMING",
                question: "Which of these is a widely used programming language for Artificial Intelligence?",
                options: {
                    A: "Python",
                    B: "HTML",
                    C: "CSS",
                    D: "Markdown"
                },
                correctAnswer: "A"
            },
            {
                round: "ROUND 2: ADVANCED ENGINEERING",
                question: "What is the primary function of a gyroscope in a robot?",
                options: {
                    A: "To measure temperature",
                    B: "To detect colors",
                    C: "To maintain balance and orientation",
                    D: "To process audio signals"
                },
                correctAnswer: "C"
            }
        ];

        let currentQuestionIndex = 0;
        let timeLeft = 30;
        let timerInterval = null;
        let isTimerRunning = false;
        let isAnswerRevealed = false;

        const elements = {
            round: document.getElementById('round-indicator'),
            question: document.getElementById('question-text'),
            A: document.getElementById('text-A'),
            B: document.getElementById('text-B'),
            C: document.getElementById('text-C'),
            D: document.getElementById('text-D'),
            boxA: document.getElementById('opt-A'),
            boxB: document.getElementById('opt-B'),
            boxC: document.getElementById('opt-C'),
            boxD: document.getElementById('opt-D'),
            timer: document.getElementById('timer')
        };

        function loadQuestion() {
            // Reset states
            clearInterval(timerInterval);
            isTimerRunning = false;
            isAnswerRevealed = false;
            timeLeft = 30;
            elements.timer.textContent = timeLeft;
            elements.timer.classList.remove('warning');

            // Remove correct/dim classes from previous question
            ['A', 'B', 'C', 'D'].forEach(letter => {
                elements['box' + letter].classList.remove('correct', 'dim');
            });

            // Load new data
            const currentQ = quizData[currentQuestionIndex];
            elements.round.textContent = currentQ.round;
            elements.question.textContent = currentQ.question;
            elements.A.textContent = currentQ.options.A;
            elements.B.textContent = currentQ.options.B;
            elements.C.textContent = currentQ.options.C;
            elements.D.textContent = currentQ.options.D;
        }

        function toggleTimer() {
            if (isAnswerRevealed) return; // Don't run timer if answer is shown

            if (isTimerRunning) {
                clearInterval(timerInterval);
                isTimerRunning = false;
            } else {
                if (timeLeft === 0) timeLeft = 30; // Reset if at zero
                isTimerRunning = true;
                elements.timer.classList.remove('warning');
                timerInterval = setInterval(() => {
                    timeLeft--;
                    elements.timer.textContent = timeLeft;
                    
                    if (timeLeft <= 10) elements.timer.classList.add('warning');
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        isTimerRunning = false;
                    }
                }, 1000);
            }
        }

        function revealAnswer() {
            if (isAnswerRevealed) return;
            isAnswerRevealed = true;
            clearInterval(timerInterval);
            isTimerRunning = false;

            const correctLetter = quizData[currentQuestionIndex].correctAnswer;

            // Highlight correct, dim the rest
            ['A', 'B', 'C', 'D'].forEach(letter => {
                if (letter === correctLetter) {
                    elements['box' + letter].classList.add('correct');
                } else {
                    elements['box' + letter].classList.add('dim');
                }
            });
        }

        // Keyboard Controls for the AV Desk
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Prevents page scrolling
                toggleTimer();
            } else if (e.code === 'Enter') {
                revealAnswer();
            } else if (e.code === 'ArrowRight') {
                if (currentQuestionIndex < quizData.length - 1) {
                    currentQuestionIndex++;
                    loadQuestion();
                }
            } else if (e.code === 'ArrowLeft') {
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                    loadQuestion();
                }
            }
        });

        // Initialize the first question on load
        loadQuestion();
    </script>
</body>
</html>
